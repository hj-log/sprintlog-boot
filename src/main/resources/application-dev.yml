# 개발 환경 (dev profile) 추가 설정
# application.yml를 값들을 덮어쓰거나 보강

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sprintlog
    username: sprintlog
    password: sprintlog
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 엔터티 클래스를 보고 CREATE, ALTER를 자동으로 만들어서 DB에 적용해 줍니다.
      ddl-auto: create
    show-sql: true # 실행되는 SQL을 콘솔에 보여줍니다.
    properties:
      hibernate:
        format_sql: true # 보기좋게 SQL을 들여쓰기해줌

sprintlog:
  welcome-message: "SprintLog Boot — DEV 환경 (개발자 모드)"
  sample-date:
    enabled: true
    count: 4

# 개발 시에는 자세한 로그가 도움됨.
logging:
  level:
    com.sprintlog: debug
    # hibernate가 실제로 완성하는 SQL과 ?자리에 채워지는 바인딩 값을 함께 보기 위함.
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace